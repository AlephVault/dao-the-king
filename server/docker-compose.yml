services:
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "8501:8501"
    environment:
      DTK_CONTRACTS_FILE: /app/contracts/contracts.json
      DTK_MONGODB_URI: mongodb://mongodb:27017
      DTK_MONGODB_DATABASE: daotheking
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
    volumes:
      - ./contracts:/app/contracts:ro
    networks:
      - daotheking

networks:
  daotheking:
    name: daotheking
