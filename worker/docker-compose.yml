services:
  mongodb:
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - daotheking

  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      DTK_CONTRACTS_FILE: /app/contracts/contracts.json
      DTK_MONGODB_URI: mongodb://mongodb:27017
      DTK_MONGODB_DATABASE: daotheking
      DTK_WORKER_POLL_INTERVAL: "15"
      DTK_WORKER_BLOCK_BATCH_SIZE: "2000"
      DTK_WORKER_ETHERSCAN_PAGE_SIZE: "100"
      DTK_WORKER_ETHERSCAN_TIMEOUT: "15"
      DTK_WORKER_ONCE: "0"
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
    volumes:
      - ./contracts:/app/contracts:ro
    networks:
      - daotheking

volumes:
  mongo-data:

networks:
  daotheking:
    name: daotheking
